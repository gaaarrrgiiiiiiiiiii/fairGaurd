[pytest]
# ---------------------------------------------------------------------------
# FairGuard — authoritative pytest configuration (repo root)
#
# WHY THIS FILE EXISTS HERE (not in backend/):
#   Tests live at <repo-root>/tests/ and import from <repo-root>/backend/app.
#   Running pytest from the repo root with PYTHONPATH=backend is the only
#   layout that works identically on local machines, CI, and Docker.
#   A config at backend/ would move rootdir to backend/ and break discovery.
# ---------------------------------------------------------------------------

# Canonical test directory — pytest will only look here
testpaths = tests

# Collect only files matching this pattern
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Add backend/ to sys.path so `from app.xxx import yyy` works without conftest hacks
pythonpath = backend

# Strict markers — prevents silent typos in @pytest.mark.*
addopts =
    --strict-markers
    -ra

# Registered markers
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks integration tests that require a running DB
    unit: fast, pure-logic unit tests
