name: FairGuard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Backend — lint + unit + integration tests
  # ───────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Prepare test dataset
        run: python data/prep_adult_data.py || echo "Dataset prep skipped (network unavailable)"

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite:///./test_fairguard.db"
          JWT_SECRET: "ci-test-secret-at-least-32-characters"
          ALLOWED_ORIGINS: "http://localhost:5173"
          FAIRGUARD_DEV_MODE: "true"
          FAIRGUARD_API_KEYS: "{}"
        run: |
          pytest tests/ -v \
            --cov=backend/app \
            --cov-report=xml \
            --cov-report=term-missing \
            -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ───────────────────────────────────────────────────────────────────────────
  # Frontend — TypeScript type check + production build
  # ───────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --silent

      - name: Type check
        run: npx tsc --noEmit

      - name: Build production bundle
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_API_TOKEN: ""
        run: npm run build

  # ───────────────────────────────────────────────────────────────────────────
  # Docker — build backend image + health-check smoke test
  # ───────────────────────────────────────────────────────────────────────────
  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image (multi-stage)
        run: docker build -t fairguard-backend ./backend

      - name: Smoke test — health check
        run: |
          docker run -d -p 8000:8000 \
            -e JWT_SECRET=ci-secret-at-least-32-characters \
            -e FAIRGUARD_DEV_MODE=true \
            -e FAIRGUARD_API_KEYS='{}' \
            --name fg-smoke fairguard-backend
          echo "Waiting for server to be ready..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "Server is up after ${i}x5s"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "Server did not start in time"
              docker logs fg-smoke
              exit 1
            fi
            sleep 5
          done
          docker stop fg-smoke
