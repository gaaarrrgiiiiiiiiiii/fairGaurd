name: FairGuard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Backend — unit + integration tests
  # ─────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare test dataset
        run: |
          cd ..
          pip install scikit-learn pandas numpy joblib
          python data/prep_adult_data.py || echo "Dataset prep skipped (network unavailable)"

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite:///./test_fairguard.db
          JWT_SECRET: ci-test-secret
          ALLOWED_ORIGINS: "http://localhost:5173"
        run: |
          cd ..
          pytest tests/ -v --cov=backend/app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend — TypeScript type check + build
  # ─────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --silent

      - name: Type check
        run: npx tsc --noEmit

      - name: Build production bundle
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────
  # Docker compose smoke test
  # ─────────────────────────────────────────────────────────────────────────
  docker-smoke:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t fairguard-backend ./backend

      - name: Smoke test — health check
        run: |
          docker run -d -p 8000:8000 --name fg-test fairguard-backend
          sleep 8
          curl -f http://localhost:8000/health
          docker stop fg-test
