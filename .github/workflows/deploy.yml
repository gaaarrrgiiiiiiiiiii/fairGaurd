name: FairGuard Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: pip install -r backend/requirements.txt

      - name: Run PyTest
        # Run from repo root — pytest.ini lives here and points to tests/
        env:
          DATABASE_URL: "sqlite:////tmp/test_fairguard.db"
          FAIRGUARD_DATA_DIR: "/tmp"
          JWT_SECRET: "deploy-ci-secret-at-least-32-characters"
          FAIRGUARD_DEV_MODE: "true"
          FAIRGUARD_API_KEYS: "{}"
          ALLOWED_ORIGINS: "http://localhost:5173"
        run: pytest -x -q

      - name: Build Docker Image
        # Dockerfile lives in backend/ — build context must be ./backend
        working-directory: ./backend
        run: docker build -t fairguard-backend:latest .

      # Placeholder for Google Kubernetes Engine or Cloud Run push
      - name: Deploy to Cloud Run
        run: |
          echo "Simulating push to GCP container registry..."
          echo "Deploying to Cloud Run..."
          echo "Deployment successful."
